services:
  sde_engine:
    build:
      context: .
      dockerfile: Dockerfile.sde
    restart: unless-stopped
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024m
        reservations:
          memory: 512m

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    restart: unless-stopped
    depends_on:
      sde_engine:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PORT=8001
      - SDE_ENGINE_URL=http://sde_engine:8000/simulate_climate_risk
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
